<div class="paging-bar">
  <div class="paging-info">
    <span class="paging-label">{{ 'COMMON.ITEMS_PER_PAGE' | translate }}</span>
    <select class="paging-select" [value]="pageSize()" (change)="onPageSizeChange($event)">
      @for (opt of pageSizeOptions(); track opt) {
        <option [value]="opt">{{ opt }}</option>
      }
    </select>
    <span class="paging-range">
      {{ pageStart() }} – {{ pageEnd() }} {{ 'COMMON.OF' | translate }} {{ totalItems() }}
    </span>
  </div>
  <div class="paging-nav">
    <button class="paging-btn" [disabled]="isFirstPage()" (click)="firstPage()" aria-label="First page">
      <mat-icon>first_page</mat-icon>
    </button>
    <button class="paging-btn" [disabled]="isFirstPage()" (click)="prevPage()" aria-label="Previous page">
      <mat-icon>chevron_left</mat-icon>
    </button>
    <span class="paging-pages">{{ pageIndex() + 1 }} / {{ totalPages() }}</span>
    <button class="paging-btn" [disabled]="isLastPage()" (click)="nextPage()" aria-label="Next page">
      <mat-icon>chevron_right</mat-icon>
    </button>
    <button class="paging-btn" [disabled]="isLastPage()" (click)="lastPage()" aria-label="Last page">
      <mat-icon>last_page</mat-icon>
    </button>
  </div>
</div>
